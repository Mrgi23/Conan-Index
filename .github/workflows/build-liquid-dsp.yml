name: Build Liquid-DSP

on:
  pull_request:
    branches: [ main ]
    paths:
      - "recipes/liquid-dsp/**"
      - "profiles/**"
      - ".github/workflows/build-liquid-dsp.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC 14 and aarch64 cross-compiler
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-14 g++-14 \

          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Install Conan
        run: pip install conan

      - name: Conan config
        run: conan profile detect --force

      - name: Authenticate Conan
        run: |
          conan remote add conancenter https://center2.conan.io --force
          conan remote add conanmrgi https://conan-upload.mrgi23.com/artifactory/api/conan/Conan-Index --force
          conan remote login conanmrgi ${{ vars.CONAN_USER }} -p ${{ secrets.CONAN_PASS }}

      - name: Build Liquid-DSP
        run: |
          conan create recipes/liquid-dsp \
          --name=liquid-dsp \
          --version=1.7.0 \
          --user=mrgi \
          --channel=release \
          -pr:b=profiles/build-linux-x86_64 \
          --build=missing

      - name: Upload package
        run: |
          conan upload "liquid-dsp/1.7.0@mrgi/release" -r=conanmrgi --force
