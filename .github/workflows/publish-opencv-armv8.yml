name: Publish OpenCV-ARMV8

on:
  workflow_call:
    inputs:
      CONAN_USER:
        required: true
        type: string
    secrets:
      CONAN_PASS:
        required: true

jobs:
  publish-opencv-armv8:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        run: pip install conan

      - name: Conan config
        run: conan profile detect --force

      - name: Authenticate Conan
        run: |
          conan remote add conanmrgi https://conan-upload.mrgi23.com/artifactory/api/conan/Conan-Index --force
          conan remote login conanmrgi ${{ inputs.CONAN_USER }} -p ${{ secrets.CONAN_PASS }}

      - name: Publish OpenCV-ARMV8
        run: |
          conan create recipes/opencv-armv8 \
          --name=opencv-armv8 \
          --version=4.13.0 \
          --user=mrgi \
          --channel=release \
          -pr:h=profiles/host-linux-aarch64 \

      - name: Remove old package
        run: |
          conan remove "opencv-armv8/4.13.0@mrgi/release" -r=conanmrgi -c

      - name: Upload package
        run: |
          conan upload "opencv-armv8/4.13.0@mrgi/release" -r=conanmrgi --force
