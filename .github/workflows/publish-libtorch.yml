name: Publish LibTorch

on:
  workflow_call:
    inputs:
      CONAN_USER:
        required: true
        type: string
    secrets:
      CONAN_PASS:
        required: true

jobs:
  publish-libtorch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        run: pip install conan

      - name: Conan config
        run: conan profile detect --force

      - name: Authenticate Conan
        run: |
          conan remote add conanmrgi https://conan-upload.mrgi23.com/artifactory/api/conan/Conan-Index --force
          conan remote login conanmrgi ${{ inputs.CONAN_USER }} -p ${{ secrets.CONAN_PASS }}

      - name: Publish LibTorch
        run: |
          conan create recipes/libtorch \
          --name=libtorch \
          --version=2.8.0-cu128 \
          --user=mrgi \
          --channel=release

      - name: Remove old package
        run: |
          conan remove "libtorch/2.8.0-cu128@mrgi/release" -r=conanmrgi -c

      - name: Upload package
        run: |
          conan upload "libtorch/2.8.0-cu128@mrgi/release" -r=conanmrgi --force
